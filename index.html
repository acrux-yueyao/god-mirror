<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EIDOLON — From Oracle to Mirror · 神谕之镜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="viewport">
  <div id="stage">
    <div id="veil" style="opacity:0"></div>

    <div id="field">
      <div id="swirlWrap" style="opacity:0">
        <div id="slamL" class="slam"><div id="swl"><img src="layers/swirl-left.png" draggable="false"></div></div>
        <div id="slamR" class="slam"><div id="swr"><img src="layers/swirl-right.png" draggable="false"></div></div>
      </div>
      <div id="camMask">
        <video id="camFg" class="cam" autoplay muted playsinline></video>
        <div class="tintA"></div>
        <div class="tintB"></div>
      </div>
      <div id="bgc" style="opacity:0"><img src="layers/cloud-eye.png" draggable="false"></div>
      <div id="ringWrap" style="opacity:0"><div id="ring"><img src="layers/ring.png" draggable="false"></div></div>
      <div id="ringBurst"></div>
      <div id="figureIn">
        <div id="figure">
          <div id="bodyGroup">
            <img id="bodyImg" src="layers/body.png" draggable="false" style="opacity:0">
            <img id="rhandImg" src="layers/hand-right.png" draggable="false" style="opacity:0">
            <img id="lhandImg" src="layers/hand-left.png" draggable="false" style="opacity:0">
          </div>
          <div id="headGroup">
            <div id="face" style="opacity:0">
              <img id="faceOpen" src="layers/face-open.png" draggable="false">
              <img id="faceClosed" src="layers/face-closed.png" draggable="false">
            </div>
          </div>
        </div>
      </div>
      <div id="oracle">
        <div id="prayerLine"></div>
        <div id="beads"></div>
        <div id="reply"></div>
        <div id="replyEn"></div>
        <div id="typing"><span id="typingLabel">对方正在输入</span><i></i><i></i><i></i></div>
        <div id="mirrorNote">( THE MIRROR STAYS DARK — 镜面无光 )</div>
      </div>
      <div id="adjPanel">
        <button id="adjToggle">ADJUST 调整模式</button>
        <div id="adjBody">
          <div class="hint">全部图层可拖动 · 悬停时滚轮缩放<br>拖身体时双手和头跟随 · 位置自动保存</div>
          <div class="slrow"><label style="color:#e8c832">FACE</label><input id="slFace" type="range" min="180" max="420" style="accent-color:#e8c832"><output id="ovFace"></output></div>
          <div class="slrow"><label style="color:#7fd4cd">BODY</label><input id="slBody" type="range" min="700" max="1200" style="accent-color:#7fd4cd"><output id="ovBody"></output></div>
          <div class="slrow"><label style="color:#ff8c66">右手</label><input id="slRhand" type="range" min="90" max="320" style="accent-color:#ff8c66"><output id="ovRhand"></output></div>
          <div class="slrow"><label style="color:#c9a44a">左手</label><input id="slLhand" type="range" min="90" max="320" style="accent-color:#c9a44a"><output id="ovLhand"></output></div>
          <div id="adjCoords"></div>
          <button id="adjReset">RESET</button>
        </div>
      </div>
    </div>

    <div id="comet"></div>
    <div id="flash"></div>
    <div id="titleCard">
      <div id="tcName">EIDOLON</div>
      <div id="tcSub">FROM ORACLE TO MIRROR · 神谕之镜</div>
      <div id="tcRule"></div>
      <div id="tcVo"></div>
    </div>

    <div id="hud">
      <div id="hudTop">
        <div>
          <div id="hudTitle">EIDOLON</div>
          <div id="hudSub">FROM ORACLE TO MIRROR · 神谕之镜</div>
        </div>
        <div id="hudDiv"><span>DIVINITY</span><span id="divPct">100%</span></div>
      </div>
      <button id="camBtn">ENABLE CAMERA</button>
      <button id="unveilBtn">BEGIN THE UNVEILING</button>
      <button id="muteBtn">SOUND ◉</button>
    </div>
    <button id="skipBtn">SKIP ▸▸</button>
    <a id="aboutLink" href="about.html">ABOUT</a>
    <div id="camErr"></div>

    <div id="chatBar">
      <input id="chatInput" type="text" maxlength="120" autocomplete="off" spellcheck="false" placeholder="…">
      <div id="sendBtn">◆</div>
    </div>
    <button id="keepsakeBtn">把这段对话留成一张符</button>

    <div id="boot">
      <div id="bootTitle">E I D O L O N</div>
      <div id="bootLine"><i></i></div>
      <div id="bootPct">CONNECTING … 0%</div>
    </div>
  </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
